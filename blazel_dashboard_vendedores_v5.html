<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blazel — Dashboard Vendedores Q1 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f1f3f6;color:#1a1a1a;font-size:14px}
.hdr{background:#1A3A5C;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:.02em}
.hdr span{font-size:11px;opacity:.65;margin-top:3px;display:block}
.badge{background:#E07B39;color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.fr{display:flex;gap:5px;align-items:flex-start;margin-bottom:7px;flex-wrap:wrap}
.fl{font-size:11px;font-weight:700;color:#888;letter-spacing:.06em;text-transform:uppercase;min-width:68px;padding-top:5px}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.p{padding:4px 11px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#666;cursor:pointer;font-size:12px;transition:all .12s;white-space:nowrap;font-weight:500}
.p:hover:not(.on){background:#f0f0f0}
.p.on{font-weight:700;color:#fff}
.s-on{background:#1A3A5C;border-color:#1A3A5C}
.v-on{background:#7F77DD;border-color:#7F77DD}
.m-on{background:#E07B39;border-color:#E07B39}
.dv{height:1px;background:#e5e7eb;margin:10px 0}
.tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:14px;background:#fff;border-radius:10px 10px 0 0;padding:0 8px}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .12s}
.tab.act{color:#1D9E75;border-bottom-color:#1D9E75}
.tab:hover:not(.act){color:#333}
.tab.act-r{color:#E07B39;border-bottom-color:#E07B39}
.ctx{font-size:11px;color:#888;margin-bottom:12px;padding:6px 12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb}
/* KPIs */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;border-top:3px solid #e5e7eb}
.kc.kc-bl{border-top-color:#1A3A5C}
.kc.kc-tl{border-top-color:#1D9E75}
.kc.kc-or{border-top-color:#E07B39}
.kc.kc-rd{border-top-color:#DC2626}
.kl{font-size:11px;color:#888;margin-bottom:4px;font-weight:600}
.kv{font-size:26px;font-weight:800;line-height:1.1}
.ks{font-size:11px;color:#aaa;margin-top:3px}
.c-tl{color:#1D9E75}.c-or{color:#E07B39}.c-gn{color:#15803D}.c-bl{color:#1A3A5C}.c-rd{color:#DC2626}
/* Charts */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.ct{font-size:12px;font-weight:700;color:#444;margin-bottom:10px}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:#888}
.ld{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.nt{font-size:11px;color:#666;padding:10px 14px;background:#fff;border-radius:8px;margin-top:12px;line-height:1.7;border-left:3px solid #1D9E75;border:1px solid #e5e7eb;border-left-width:3px}
/* RANKING */
.rank-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
.rank-head{padding:14px 20px;background:#1A3A5C;color:#fff;display:flex;align-items:center;justify-content:space-between}
.rank-head h2{font-size:14px;font-weight:700}
.rank-head span{font-size:11px;opacity:.7}
/* Podio */
.podio{display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:24px 20px 16px;background:linear-gradient(180deg,#1A3A5C08 0%,#fff 100%)}
.pod{text-align:center;flex:1;max-width:180px}
.pod-pos{font-size:32px;margin-bottom:4px}
.pod-bar{border-radius:8px 8px 0 0;margin:0 auto 8px;width:70px}
.pod-name{font-size:12px;font-weight:700;color:#1A3A5C;line-height:1.3;margin-bottom:4px}
.pod-tienda{font-size:10px;color:#888;margin-bottom:6px}
.pod-pct{font-size:22px;font-weight:800;margin-bottom:2px}
.pod-sub{font-size:11px;color:#888}
.pod1 .pod-bar{height:90px;background:linear-gradient(180deg,#F59E0B,#D97706)}
.pod2 .pod-bar{height:65px;background:linear-gradient(180deg,#9CA3AF,#6B7280)}
.pod3 .pod-bar{height:45px;background:linear-gradient(180deg,#CD7C2F,#B45309)}
/* Rank table */
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{text-align:left;padding:9px 16px;background:#f9fafb;color:#666;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e5e7eb}
.rtable td{padding:9px 16px;border-bottom:1px solid #f3f4f6;color:#1a1a1a}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:#f9fafb}
.rbar-wrap{width:120px;height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.rbar-fill{height:100%;border-radius:4px}
.rbadge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.rb-ok{background:#DCFCE7;color:#15803D}
.rb-mid{background:#FEF3C7;color:#92400E}
.rb-low{background:#FEE2E2;color:#991B1B}
.rank-mes-pills{display:flex;gap:5px;padding:12px 16px;border-bottom:1px solid #f3f4f6;background:#fafafa}
.rank-mes-pills .p{font-size:11px;padding:3px 10px}
.empty-rank{padding:32px;text-align:center;color:#aaa;font-size:13px}
@media(max-width:768px){.kg{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:1fr}.podio{gap:6px}}
</style>
</head>

  if(!rows||rows.length===0){
    document.getElementById('podio-wrap').innerHTML='<div class="empty-rank">Sin datos disponibles para esta seleccion</div>';
    document.getElementById('rank-body').innerHTML='';
    return;
  }

  // Podio top 3
  const top3=rows.slice(0,3);
  const podOrder=[1,0,2]; // plata, oro, bronce visual
  const podPosLabel=['1°','2°','3°'];
  let podHTML='';
  // Reorder for visual: 2nd left, 1st center, 3rd right
  const visual=[rows[1],rows[0],rows[2]].filter(Boolean);
  const heights=[65,90,45];
  const posLabels=['2°','1°','3°'];
  const podStyles=['pod2','pod1','pod3'];
  visual.forEach((r,i)=>{
    const realPos=rows.indexOf(r);
    podHTML+=`<div class="pod ${podStyles[i]}">
      <div class="pod-pos">${medal(realPos)}</div>
      <div class="pod-bar" style="height:${heights[i]}px"></div>
      <div class="pod-name">${r.v.split(' ')[0]} ${r.v.split(' ').slice(-1)[0]}</div>
      ${isGlobal&&r.tienda?`<div class="pod-tienda">${r.tienda}</div>`:''}
      <div class="pod-pct" style="color:${podColor(realPos)}">${r.pct}%</div>
      <div class="pod-sub">${r.con_hfc} de ${r.movil} moviles</div>
    </div>`;
  });
  document.getElementById('podio-wrap').innerHTML=podHTML;

  // Table (all)
  const maxPct=rows[0]?rows[0].pct:1;
  const body=rows.map((r,i)=>{
    const cls=r.pct>=5?'rb-ok':r.pct>=3?'rb-mid':'rb-low';
    const fillW=Math.round(r.pct/Math.max(maxPct,1)*100);
    const fillC=r.pct>=5?G:r.pct>=3?O:R;
    return `<tr>
      <td><strong>${i+1}</strong></td>
      <td><strong>${r.v}</strong></td>
      ${isGlobal?`<td style="color:#888">${r.tienda||''}</td>`:''}
      <td>${r.movil.toLocaleString()}</td>
      <td><strong>${r.con_hfc}</strong></td>
      <td>${r.hfc}</td>
      <td>
        <span class="rbar-wrap"><span class="rbar-fill" style="width:${fillW}%;background:${fillC}"></span></span>
        <span class="rbadge ${cls}">${r.pct}%</span>
      </td>
      <td style="color:#DC2626">${(r.movil-r.con_hfc).toLocaleString()}</td>
    </tr>`;
  }).join('');
  document.getElementById('rank-body').innerHTML=body;
}

        <div style="position:relative;height:220px"><canvas id="c1a"></canvas></div></div>
