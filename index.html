<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f2f5;color:#1a1a1a;font-size:14px}
.hdr{background:#1A3A5C;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-l h1{font-size:15px;font-weight:700;letter-spacing:.01em}
.hdr-l p{font-size:11px;opacity:.6;margin-top:2px}
.badge{background:#E07B39;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.main{padding:14px 18px;max-width:1400px;margin:0 auto}
/* Filter rows */
.frow{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap}
.flbl{font-size:10px;font-weight:700;color:#999;letter-spacing:.07em;text-transform:uppercase;min-width:65px;padding-top:6px}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 11px;border-radius:20px;border:1.5px solid #d1d5db;background:#fff;color:#555;cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;white-space:nowrap}
.pill:hover:not(.on){background:#f5f5f5}
.pill.on{color:#fff;border-color:transparent;font-weight:700}
.pill.s-on{background:#1A3A5C}
.pill.v-on{background:#7F77DD}
.pill.m-on{background:#E07B39}
/* Nav tabs */
.nav{display:flex;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:14px}
.ntab{flex:1;padding:10px 6px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border:none;background:none;transition:all .12s;text-align:center;border-bottom:3px solid transparent}
.ntab:hover:not(.act):not(.act-r){color:#555;background:#fafafa}
.ntab.act{color:#1D9E75;border-bottom-color:#1D9E75;background:#f0fdf4}
.ntab.act-r{color:#E07B39;border-bottom-color:#E07B39;background:#fff7ed}
/* Context bar */
.ctx{font-size:11px;color:#888;padding:6px 12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:12px}
/* KPI grid */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px 15px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.k-bl::before{background:#1A3A5C}.kc.k-tl::before{background:#1D9E75}
.kc.k-or::before{background:#E07B39}.kc.k-rd::before{background:#DC2626}
.kc.k-gn::before{background:#15803D}
.klbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.kval{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px}
.ksub{font-size:11px;color:#aaa}
.c-tl{color:#1D9E75}.c-or{color:#E07B39}.c-gn{color:#15803D}.c-bl{color:#1A3A5C}.c-rd{color:#DC2626}
/* Charts */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
.cct{font-size:12px;font-weight:700;color:#555;margin-bottom:10px}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:#888}
.ld{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.nt{font-size:11px;color:#666;padding:10px 14px;background:#fff;border-radius:8px;margin-top:12px;line-height:1.7;border:1px solid #e5e7eb;border-left:3px solid #1D9E75}
/* Ranking */
.rk-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
.rk-hdr{padding:13px 18px;background:#1A3A5C;color:#fff;display:flex;align-items:center;justify-content:space-between}
.rk-hdr h2{font-size:14px;font-weight:700}
.rk-hdr span{font-size:11px;opacity:.65}
.rk-filters{padding:10px 16px;background:#f9fafb;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.rk-filters .flbl{min-width:40px}
/* Podio */
.podio{display:flex;justify-content:center;align-items:flex-end;gap:10px;padding:20px 16px 12px;background:linear-gradient(180deg,#1A3A5C0a 0%,#fff 100%)}
.pod{text-align:center;flex:1;max-width:200px}
.pod-medal{font-size:28px;margin-bottom:6px;display:block}
.pod-bar{border-radius:6px 6px 0 0;margin:0 auto 10px;width:64px}
.pod-name{font-size:12px;font-weight:700;color:#1A3A5C;margin-bottom:2px;line-height:1.3}
.pod-tienda{font-size:10px;color:#aaa;margin-bottom:6px}
.pod-pct{font-size:24px;font-weight:900;line-height:1}
.pod-sub{font-size:11px;color:#888;margin-top:2px}
.p1 .pod-bar{height:88px;background:linear-gradient(#F59E0B,#D97706)}
.p2 .pod-bar{height:62px;background:linear-gradient(#9CA3AF,#6B7280)}
.p3 .pod-bar{height:44px;background:linear-gradient(#CD7C2F,#92400E)}
/* Rank table */
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:8px 14px;background:#f9fafb;color:#666;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid #e5e7eb;white-space:nowrap}
.rt td{padding:8px 14px;border-bottom:1px solid #f3f4f6;color:#1a1a1a;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tr:hover td{background:#fafafa}
.rt .rnum{font-weight:800;color:#ccc;font-size:13px}
.rt .rname{font-weight:600}
.bbar{width:100px;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.bfill{height:100%;border-radius:3px}
.badge2{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;vertical-align:middle}
.b-ok{background:#DCFCE7;color:#15803D}.b-mid{background:#FEF3C7;color:#92400E}.b-low{background:#FEE2E2;color:#991B1B}
.empty{text-align:center;padding:30px;color:#ccc;font-size:13px}
@media(max-width:700px){.kg{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}.podio{gap:4px}}
</style>
</head>

    const pct_tot=tot_m>0?+(tot_h/tot_m*100).toFixed(1):0;
    kg.innerHTML=
      kc(tot_m.toLocaleString(),'Moviles postpago vendidos','Total oportunidades','c-bl','k-bl')+
      kc(tot_h,'HFC propias vendidas',pct_tot+'% de conversion fija/movil','c-tl','k-tl')+
      kc((tot_m-tot_h).toLocaleString(),'Oportunidades sin fija',p(tot_m-tot_h,tot_m)+'% del total','c-rd','k-rd')+
      kc(pct_tot+'%','Tasa fija/movil','Meta sugerida: 20%',pct_tot>=15?'c-gn':pct_tot>=8?'c-or':'c-rd',pct_tot>=15?'k-gn':pct_tot>=8?'k-or':'k-rd');
    cg.innerHTML=`
      <div class="cc"><div class="cct">Moviles vendidos vs HFC — por mes</div>
        <div class="leg"><span><span class="ld" style="background:${B}33"></span>Moviles sin fija propia</span><span><span class="ld" style="background:${G}"></span>HFC propias vendidas</span></div>
        <div style="position:relative;height:210px"><canvas id="c0a"></canvas></div></div>
      <div class="cc"><div class="cct">% conversion fija/movil — por mes</div>
        <div style="position:relative;height:210px"><canvas id="c0b"></canvas></div></div>`;
    setTimeout(()=>{
      mkBar('c0a',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.movil-r.hfc),backgroundColor:B+'33',borderColor:B+'66',borderWidth:1,borderRadius:4,stack:'s'},
        {data:ms.map(r=>r.hfc),backgroundColor:G+'cc',borderColor:G,borderWidth:1.5,borderRadius:4,stack:'s'}
      ],true,false);
      mkBar('c0b',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.pct),backgroundColor:ms.map(r=>r.pct>=15?G:r.pct>=8?O:R),borderRadius:5}
      ],false,true);
    },50);
    nt.textContent='Oportunidad: de cada movil postpago vendido, cuantos HFC propias vendio el mismo vendedor? Ej: si vendio 100 moviles y 15 fijas = 15% de conversion. No requiere que sea el mismo cliente — mide la productividad del vendedor en ambos productos.';

  } else if(cT===1){
    const ms=d.v.m;
    const rows=cM==='TODOS'?ms:ms.filter(r=>r.mes===cM);
    const th=rows.reduce((a,r)=>a+r.hfc,0);
    const tm=rows.reduce((a,r)=>a+r.con_movil,0);
    const tf=rows.reduce((a,r)=>a+r.con_fc,0);
    const tsf=rows.reduce((a,r)=>a+r.sin_fc,0);
    kg.innerHTML=
      kc(th.toLocaleString(),'HFC vendidas','Total fijas del vendedor','c-bl','k-bl')+
      kc(tm,'Con movil postpago (mismo DNI)',p(tm,th)+'% de sus HFC','c-tl','k-tl')+
      kc(tf,'Con Full Claro (ventana)',p(tf,th)+'% de sus HFC','c-gn','k-gn')+
      kc(tsf,'Sin Full Claro','Cliente ya tenia fija antes','c-or','k-or');
    cg.innerHTML=`
      <div class="cc"><div class="cct">HFC por mes: desglose cruce DNI</div>
        <div class="leg"><span><span class="ld" style="background:#e5e7eb"></span>Solo fija</span><span><span class="ld" style="background:${B}77"></span>Con movil, sin FC</span><span><span class="ld" style="background:${G}"></span>Full Claro</span></div>
        <div style="position:relative;height:210px"><canvas id="c1a"></canvas></div></div>
      <div class="cc"><div class="cct">% venta cruzada — por mes</div>
        <div class="leg"><span><span class="ld" style="background:${G}"></span>% Full Claro</span><span><span class="ld" style="background:${B}77"></span>% con movil</span></div>
        <div style="position:relative;height:210px"><canvas id="c1b"></canvas></div></div>`;
    setTimeout(()=>{
      mkBar('c1a',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.hfc-r.con_movil),backgroundColor:'#e5e7eb',stack:'s',borderRadius:4},
        {data:ms.map(r=>r.sin_fc),backgroundColor:B+'77',stack:'s',borderRadius:4},
        {data:ms.map(r=>r.con_fc),backgroundColor:G+'cc',borderColor:G,borderWidth:1,stack:'s',borderRadius:4}
      ],true,false);
      mkBar('c1b',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.pct_movil),backgroundColor:B+'77',borderColor:B,borderWidth:1.5,borderRadius:4},
        {data:ms.map(r=>r.pct_fc),backgroundColor:G+'cc',borderColor:G,borderWidth:1.5,borderRadius:4}
      ],false,true);
    },50);
    nt.textContent='Venta cruzada: por cada HFC vendida, el cliente tiene movil postpago en Blazel (mismo DNI)? Full Claro = coincide en ventana temporal (mismo mes o ≤15 dias del siguiente mes).';

  } else {
    const ms=d.t.m;
    const rows=cM==='TODOS'?ms:ms.filter(r=>r.mes===cM);
    const th=rows.reduce((a,r)=>a+r.hfc,0);
    const teq=rows.reduce((a,r)=>a+r.con_equipo,0);
    const tch=rows.reduce((a,r)=>a+r.con_chip,0);
    const tsin=rows.reduce((a,r)=>a+r.sin_movil,0);
    kg.innerHTML=
      kc(th.toLocaleString(),'HFC vendidas','Total fijas','c-bl','k-bl')+
      kc(teq,'Con equipo postpago',p(teq,th)+'% de sus HFC','c-tl','k-tl')+
      kc(tch,'Con chip postpago',p(tch,th)+'% de sus HFC','c-or','k-or')+
      kc(tsin,'Sin movil postpago',p(tsin,th)+'% — opp movil','c-rd','k-rd');
    cg.innerHTML=`
      <div class="cc"><div class="cct">Tipo movil del cliente HFC — por mes</div>
        <div class="leg"><span><span class="ld" style="background:${G}"></span>Equipo</span><span><span class="ld" style="background:${O}"></span>Chip</span><span><span class="ld" style="background:#e5e7eb"></span>Sin movil</span></div>
        <div style="position:relative;height:210px"><canvas id="c2a"></canvas></div></div>
      <div class="cc"><div class="cct">% distribucion tipo movil — por mes</div>
        <div style="position:relative;height:210px"><canvas id="c2b"></canvas></div></div>`;
    setTimeout(()=>{
      mkBar('c2a',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.con_equipo),backgroundColor:G+'cc',borderColor:G,borderWidth:1,borderRadius:4,stack:'s'},
        {data:ms.map(r=>r.con_chip),backgroundColor:O+'cc',borderColor:O,borderWidth:1,borderRadius:4,stack:'s'},
        {data:ms.map(r=>r.sin_movil),backgroundColor:'#e5e7eb',stack:'s',borderRadius:4}
      ],true,false);
      mkBar('c2b',ms.map(r=>r.mes),[
        {data:ms.map(r=>r.pct_eq),backgroundColor:G+'cc',borderRadius:4,stack:'s'},
        {data:ms.map(r=>r.pct_ch),backgroundColor:O+'cc',borderRadius:4,stack:'s'},
        {data:ms.map(r=>r.pct_sin),backgroundColor:'#e5e7eb',stack:'s',borderRadius:4}
      ],true,true);
    },50);
    nt.textContent='Tipo movil: de las HFC vendidas por este vendedor, el cliente tiene equipo postpago, chip postpago, o ningun movil en Blazel? Identifica oportunidad de crosselling movil.';
  }
}

function renderRank(){
  const rows=gr();
  const isG=cS==='TODAS';
  const slbl=SL[cS]||'TODAS';
  document.getElementById('rk-sub').textContent=`${slbl} · ${cRM==='TODOS'?'Todo 2026':cRM+' 2026'}`;
  document.getElementById('th-t').style.display=isG?'':'none';
  if(!rows||rows.length===0){
    document.getElementById('podio').innerHTML='<div class="empty">Sin datos para esta seleccion</div>';
    document.getElementById('rk-body').innerHTML=''; return;
  }
  // Podio: visual order 2nd-left, 1st-center, 3rd-right
  const visual=[rows[1],rows[0],rows[2]].filter(Boolean);
  const pcls=['p2','p1','p3'];
  const pnum=['2°','1°','3°'];
  const pcol=['#6B7280','#D97706','#92400E'];
  document.getElementById('podio').innerHTML=visual.map((r,i)=>{
    const ri=rows.indexOf(r);
    const medal=['🥇','🥈','🥉'][ri]||'';
    return `<div class="pod ${pcls[i]}">
      <span class="pod-medal">${medal}</span>
      <div class="pod-bar"></div>
      <div class="pod-name">${(r.v.split(' ').length<=2?r.v:r.v.split(' ')[0]+' '+r.v.split(' ')[1])}</div>
      ${isG&&r.tienda?`<div class="pod-tienda">${r.tienda}</div>`:''}
      <div class="pod-pct" style="color:${pcol[i]}">${r.pct}%</div>
      <div class="pod-sub">${r.hfc} HFC / ${r.movil} moviles</div>
    </div>`;
  }).join('');
  const maxP=rows[0]?rows[0].pct:1;
  document.getElementById('rk-body').innerHTML=rows.map((r,i)=>{
    const cls=r.pct>=15?'b-ok':r.pct>=8?'b-mid':'b-low';
    const fc=r.pct>=15?G:r.pct>=8?O:R;
    const fw=Math.round(r.pct/Math.max(maxP,1)*100);
    return `<tr>
      <td class="rnum">${i+1}</td>
      <td class="rname">${r.v}</td>
      ${isG?`<td style="color:#888;font-size:11px">${r.tienda||''}</td>`:''}
      <td>${r.movil.toLocaleString()}</td>
      <td><strong>${r.hfc}</strong></td>
      <td>
        <span class="bbar"><span class="bfill" style="width:${fw}%;background:${fc}"></span></span>
        <span class="badge2 ${cls}">${r.pct}%</span>
      </td>
      <td style="color:#DC2626">${(r.movil-r.hfc).toLocaleString()}</td>
    </tr>`;
  }).join('');
}

buildSP(); buildVP();
setTab(3);
