<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f2f5;color:#1a1a1a;font-size:13px}
.hdr{background:#1A3A5C;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700}.hdr p{font-size:10px;opacity:.6;margin-top:2px}
.live{background:#E07B39;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.lvl-bar{background:#0F2840;padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lvl-bar span{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase;padding-top:2px}
.lvl{padding:6px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.75);cursor:pointer;font-size:11px;font-weight:600;background:rgba(255,255,255,.1);transition:all .15s}
.lvl:hover:not(.act){background:rgba(255,255,255,.2);color:#fff}
.lvl.act{background:#E07B39;color:#fff;border-color:#E07B39;font-weight:700}
.fbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.flbl{font-size:10px;font-weight:700;color:#999;letter-spacing:.06em;text-transform:uppercase}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:16px;border:1px solid #d1d5db;background:#fff;color:#666;cursor:pointer;font-size:11px;font-weight:500;transition:all .12s;white-space:nowrap}
.pill:hover:not(.on){background:#f5f5f5}
.pill.on{color:#fff;font-weight:700;border-color:transparent}
.p-s{background:#1A3A5C}.p-v{background:#7F77DD}.p-m{background:#E07B39}
.p-zero{background:#FEE2E2;color:#DC2626;border-color:#FCA5A5}
.p-zero:hover{background:#FECACA;color:#B91C1C}
.tabbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;overflow-x:auto}
.ttab{padding:9px 15px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.ttab.act{color:#1A3A5C;border-bottom-color:#1A3A5C}
.ttab:hover:not(.act){color:#333}
.main{padding:14px 18px;max-width:1500px;margin:0 auto}
.ctx{font-size:11px;color:#888;padding:5px 12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:12px}
.kg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 15px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.k-bl::before{background:#1A3A5C}.kc.k-tl::before{background:#1D9E75}
.kc.k-or::before{background:#E07B39}.kc.k-rd::before{background:#DC2626}
.kc.k-pu::before{background:#7F77DD}.kc.k-gd::before{background:#D97706}.kc.k-gn::before{background:#15803D}
.klbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.kval{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.ksub{font-size:10px;color:#aaa}.kproj{font-size:11px;color:#E07B39;font-weight:600;margin-top:3px}
.c-tl{color:#1D9E75}.c-or{color:#E07B39}.c-gn{color:#15803D}.c-bl{color:#1A3A5C}.c-rd{color:#DC2626}.c-gd{color:#D97706}.c-pu{color:#7F77DD}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px}
.cct{font-size:11px;font-weight:700;color:#555;margin-bottom:8px}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;font-size:10px;color:#888}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:2px;vertical-align:middle}
.tbl-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:14px}
.tbl-hdr{padding:10px 14px;border-bottom:1px solid #f0f0f0}
.tbl-hdr h3{font-size:12px;font-weight:700;color:#444}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{text-align:left;padding:7px 12px;background:#f9fafb;color:#777;font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e5e7eb}
table.dt td{padding:7px 12px;border-bottom:1px solid #f5f5f5;color:#1a1a1a}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:#fafafa}
.sec-title{font-size:12px;font-weight:700;color:#444;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb}
.proj-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;gap:20px;flex-wrap:wrap}
.proj-item{text-align:center}
.proj-lbl{font-size:10px;color:#92400e;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.proj-val{font-size:20px;font-weight:800;color:#E07B39}
.proj-sub{font-size:10px;color:#aaa}
@media(max-width:700px){.kg4,.kg3{grid-template-columns:1fr 1fr}.cg2{grid-template-columns:1fr}}
</style>
</head>

function mkBar(id,labels,datasets,stacked,yFmt){
  const el=document.getElementById(id);
  if(!el) return;
  const labelPlugin={id:'lbl_'+id,afterDatasetsDraw(chart){
    const ctx=chart.ctx,ds=chart.data.datasets;
    if(stacked){
      // label on top of stack
      const lm=chart.getDatasetMeta(ds.length-1);
      lm.data.forEach((bar,i)=>{
        const tot=ds.reduce((a,d)=>a+(+d.data[i]||0),0);
        if(!tot)return;
        const txt=yFmt==='S'?'S/'+Math.round(tot).toLocaleString('es-PE'):tot.toLocaleString('es-PE');
        ctx.save();ctx.fillStyle='#333';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
        ctx.fillText(txt,bar.x,bar.y-4);ctx.restore();
      });
    } else {
      ds.forEach((dataset,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const v=+dataset.data[i];if(!v)return;
          const txt=yFmt==='S'?'S/'+Math.round(v).toLocaleString('es-PE'):(yFmt==='%'?v+'%':v.toLocaleString('es-PE'));
          ctx.save();ctx.fillStyle='#333';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
          ctx.fillText(txt,bar.x,bar.y-4);ctx.restore();
        });
      });
    }
  }};
  charts[id]=new Chart(el,{type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{stacked:!!stacked,grid:{display:false},ticks:{color:'#888',font:{size:10}}},
        y:{stacked:!!stacked,grid:{color:'rgba(0,0,0,.05)'},
           ticks:{color:'#888',font:{size:9},callback:yFmt?
             v=>(yFmt==='S'?'S/'+v.toLocaleString():v+'%'):undefined}}}},
    plugins:[labelPlugin]});
}

    const ctx=chart.ctx;

      chart.getDatasetMeta(di).data.forEach((bar,i)=>{
        const v=+ds.data[i];if(!v)return;
        ctx.save();ctx.fillStyle='#333';ctx.font='bold 9px sans-serif';
        ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText(v.toLocaleString('es-PE'),bar.x+4,bar.y);ctx.restore();
      });
    });
  }};
  charts[id]=new Chart(el,{type:'bar',data:{labels,datasets},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      layout:{padding:{right:35}},
      scales:{x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#888',font:{size:9}}},
              y:{grid:{display:false},ticks:{color:'#444',font:{size:10,weight:'bold'}}}}},
    plugins:[hLblPlugin]});
}
function mkDonut(id,labels,data,colors){
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},color:'#888',padding:8}}}}});
}

// ── HELPERS ──────────────────────────────────────────────────
function fmt(n){return Number(n||0).toLocaleString('es-PE',{maximumFractionDigits:0});}
function fmtS(n){return 'S/'+fmt(n);}
function pct(a,b){return b>0?+(a/b*100).toFixed(1):0;}
function kc(val,lbl,sub,vc,kk,pr){
  return '<div class="kc '+kk+'"><div class="klbl">'+lbl+'</div><div class="kval '+vc+'">'+val+'</div><div class="ksub">'+sub+'</div>'+(pr?'<div class="kproj">&#x25B6; Proy: '+pr+'</div>':'')+'</div>';
}
function projBox(items){
  return '<div class="proj-box">'+items.map(i=>'<div class="proj-item"><div class="proj-lbl">'+i.l+'</div><div class="proj-val">'+i.v+'</div><div class="proj-sub">'+i.s+'</div></div>').join('')+'</div>';
}

// ── FILTERS ──────────────────────────────────────────────────
function setLvl(l){
  cLvl=l;cTab=0;cS='TODAS';cV='TODOS';
  qs('.lvl').forEach(b=>b.classList.toggle('act',b.textContent.toLowerCase().includes(l.substring(0,4))));
  buildSP();buildVP();buildTabs();render();
}
function setStore(s){cS=s;cV='TODOS';setAct('#sp',s,'p-s');buildVP();render();}
function setVend(v){cV=v;setAct('#vp',v,'p-v');render();}
function setMes(m){cM=m;setAct(null,m,'p-m','.fbar');buildVP();render();}
function setMod(m){cMod=m;render();}
function setTab(t){cTab=t;qs('.ttab').forEach((el,i)=>el.classList.toggle('act',i===t));render();}
function qs(s){return Array.from(document.querySelectorAll(s));}
function setAct(sel,val,cls,base){
  const scope=base?document.querySelector(base):document;
  scope.querySelectorAll('.pill').forEach(p=>{
    if(sel&&!p.closest(sel)) return;
    p.classList.remove('on',cls);
    if(p.dataset.k===val) p.classList.add('on',cls);
  });
}

function buildSP(){
  document.getElementById('sp').innerHTML=STORES.map(s=>
    '<button class="pill'+(s==='TODAS'?' on p-s':'')+'" data-k="'+s+'" data-pdv="'+s+'" onclick="setStore(this.dataset.pdv)">'+
    (SL[s]||s.replace('Tienda - ',''))+'</button>').join('');
}
function buildVP(){
  const show=(cLvl==='supervision')||(cLvl==='jefatura'&&cS!=='TODAS');
  document.getElementById('vp-row').style.display=show?'flex':'none';
  if(!show) return;
  const vs=VENDS[cS]||['TODOS'];
  document.getElementById('vp').innerHTML=vs.map(v=>{
    const nm=v==='TODOS'?'TODOS':v.split(' ').slice(0,2).join(' ');
    let active=true;
    if(v!=='TODOS'&&cM!=='TODOS'&&cS!=='TODAS'){
      const vdata=ALL.vendedores[cS]&&ALL.vendedores[cS][v];
      const u=vdata&&vdata.units&&vdata.units[cM];
      active=(u&&u.total>0)||false;
    }
    const sel=(v===cV);
    const cls=sel?' on p-v':(!active?' p-zero':'');
    return '<button class="pill'+cls+'" data-k="'+v+'" data-vnd="'+v+'" onclick="setVend(this.dataset.vnd)">'+nm+'</button>';
  }).join('');
}
function buildTabs(){
  const tabs=TABS[cLvl]||[];
  document.getElementById('tabbar').innerHTML=tabs.map((t,i)=>
    '<button class="ttab'+(i===0?' act':'')+'" onclick="setTab('+i+')">'+t+'</button>').join('');
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  destroyCharts();
  const sd=storeData(), vd=vendData(), od=oppData();
  const u=getUnits(vd,cM), cf=getCF(vd,cM), eq=getEq(sd,cM);
  const slbl=SL[cS]||'Todas las tiendas';
  const vlbl=cV==='TODOS'?'':' · '+cV.split(' ').slice(0,2).join(' ');
  const mlbl=cM==='TODOS'?'Q1+Abr 2026':(cM==='Abr'?'Abr 2026 (parcial)':cM+' 2026');
  document.getElementById('ctx').textContent=slbl+vlbl+' · '+mlbl;
  const c=document.getElementById('content');
  ({ceo:rCEO,gerencia:rGerencia,jefatura:rJef,supervision:rJef}[cLvl]||rJef)(sd,vd,od,u,cf,eq,c);
}

// ── CEO ───────────────────────────────────────────────────────
function rCEO(sd,vd,od,u,cf,eq,c){
  if(cTab===0) rKPIGlobal(sd,u,cf,eq,od,c);
  else if(cTab===1) rAvanceQ(sd,vd,u,c);
  else if(cTab===2) rCF(sd,vd,cf,c);
  else if(cTab===3) rEqIng(sd,eq,c);
  else if(cTab===4) rGamaMarcas(sd,c);
  else rProyeccion(c);
}
function rGerencia(sd,vd,od,u,cf,eq,c){
  if(cTab===0) rKPITiendas(c);
  else if(cTab===1) rAvanceQ(sd,vd,u,c);
  else if(cTab===2) rCF(sd,vd,cf,c);
  else rOpp(od,c);
}
function rJef(sd,vd,od,u,cf,eq,c){
  if(cTab===0) rResumen(sd,vd,od,u,cf,c);
  else if(cTab===1) rAvanceQ(sd,vd,u,c);
  else if(cTab===2) rCF(sd,vd,cf,c);
  else rOpp(od,c);
}

// ── KPI GLOBAL ───────────────────────────────────────────────
function rKPIGlobal(sd,u,cf,eq,od,c){
  const ma=mesArr();
  const tU=ma.reduce((a,m)=>a+(sd.units&&sd.units[m]?sd.units[m].total:0),0);
  const tP=ma.reduce((a,m)=>a+(sd.units&&sd.units[m]&&sd.units[m].by_mod?sd.units[m].by_mod['Postpago']||0:0),0);
  const tCF=ma.reduce((a,m)=>a+(sd.cf&&sd.cf[m]?sd.cf[m].total:0),0);
  const tHFC=ma.reduce((a,m)=>a+(sd.units&&sd.units[m]&&sd.units[m].by_op?sd.units[m].by_op['HFC']||0:0),0);
  const tEqI=ma.reduce((a,m)=>a+(sd.eq&&sd.eq[m]?sd.eq[m].ing_equipos:0),0);
  const {GA}=getGama(sd,cM,cMod);
  c.innerHTML=
    '<p class="sec-title">&#128200; KPIs Globales</p>'+
    '<div class="kg4">'+
      kc(fmt(tU),'Total activaciones','Todo el periodo','c-bl','k-bl',null)+
      kc(fmt(tP),'Movil postpago',pct(tP,tU)+'% del total','c-pu','k-pu',null)+
      kc(fmtS(Math.round(tCF)),'Cargo fijo acumulado','Solo postpago','c-tl','k-tl',null)+
      kc(fmt(tHFC),'HFC vendidas','Fija residencial','c-or','k-or',null)+
    '</div>'+
    '<div class="kg4">'+
      kc(fmtS(Math.round(tEqI)),'Ingreso equipos','Precio cobrado al cliente','c-gd','k-gd',null)+
      kc(fmt(GA),'Gama alta','Equipos movil','c-gn','k-gn',null)+
      kc(fmt(od.o.t.hfc),'HFC a clientes movil','Crosselling postpago','c-or','k-or',null)+
      (function(){const oppPct=cM==='TODOS'?od.o.t.pct:((od.o.m.find(r=>r.mes===cM)||{pct:0}).pct);const oppHFC=cM==='TODOS'?od.o.t.hfc:((od.o.m.find(r=>r.mes===cM)||{hfc:0}).hfc);const oppMov=cM==='TODOS'?od.o.t.movil:((od.o.m.find(r=>r.mes===cM)||{movil:0}).movil);return kc(oppPct+'%','% Oport. fija/movil',oppHFC+' HFC / '+oppMov+' movil','c-gn','k-tl',null);})()+
    '</div>'+
    '<p class="sec-title" style="margin-top:4px">Resumen por tienda</p>'+
    '<div class="tbl-wrap"><table class="dt"><thead><tr>'+
      '<th>Tienda</th><th>Activaciones</th><th>Postpago</th><th>HFC</th><th>CF (S/)</th><th style="color:#E07B39">Proy CF Abr (S/)</th>'+
    '</tr></thead><tbody>'+
    ALL.meta.tiendas_ok.map(pdv=>{
      const td=ALL.tiendas[pdv];if(!td)return'';
      const mu=getUnits(td,'TODOS'),mc=getCF(td,'TODOS');
      const ac=td.cf&&td.cf['Abr']?td.cf['Abr'].total:0;
      return '<tr><td><strong>'+(SL[pdv]||pdv)+'</strong></td>'+
        '<td>'+fmt(mu.total)+'</td>'+
        '<td>'+fmt(mu.by_mod['Postpago']||0)+'</td>'+
        '<td>'+fmt(mu.by_op['HFC']||0)+'</td>'+
        '<td>'+fmtS(Math.round(mc.total))+'</td>'+
        '<td style="color:#E07B39;font-weight:700">'+fmtS(Math.round(ac/9*30))+'</td></tr>';
    }).join('')+
    '</tbody></table></div>'+
    '<div class="cg2" style="margin-top:12px">'+
      '<div class="cc"><div class="cct">Activaciones por mes</div>'+
        '<div class="leg"><span><span class="ld" style="background:'+P+'cc"></span>Postpago</span><span><span class="ld" style="background:'+O+'cc"></span>Prepago</span></div>'+
        '<div style="position:relative;height:220px"><canvas id="kg1"></canvas></div></div>'+
      '<div class="cc"><div class="cct">Cargo fijo por mes (S/)</div>'+
        '<div style="position:relative;height:220px"><canvas id="kg2"></canvas></div></div>'+
    '</div>';
  setTimeout(()=>{
    mkBar('kg1',MESES,[
      {data:MESES.map(m=>sd.units&&sd.units[m]?sd.units[m].by_mod['Postpago']||0:0),backgroundColor:P+'cc',stack:'s',borderRadius:3,label:'Post'},
      {data:MESES.map(m=>sd.units&&sd.units[m]?sd.units[m].by_mod['Prepago']||0:0),backgroundColor:O+'cc',stack:'s',borderRadius:3,label:'Pre'}
    ],true,false);
    mkBar('kg2',MESES,[
      {data:MESES.map(m=>Math.round(sd.cf&&sd.cf[m]?sd.cf[m].total:0)),backgroundColor:G+'cc',borderRadius:4}
    ],false,'S');
  },80);
}

    '<div class="cg2">'+
      '<div class="cc"><div class="cct">Por tipo de operacion</div>'+

      '<div class="cc"><div class="cct">Chip vs Equipo por mes</div>'+

    ALL.meta.tiendas_ok.map(pdv=>{
      const te=ALL.tiendas[pdv];if(!te)return'';
      const me=getEq(te,cM);
      return '<tr><td><strong>'+(SL[pdv]||pdv)+'</strong></td>'+
        '<td>'+fmt(me.n_equipos)+'</td>'+
        '<td>'+fmtS(Math.round(me.ing_equipos))+'</td>'+
        '<td>'+fmtS(Math.round(me.cuotas_ini))+'</td>'+
        '<td>'+fmtS(Math.round(me.rentas_adel))+'</td>'+
        '<td><strong>'+fmtS(Math.round(me.total_col))+'</strong></td></tr>';
    }).join('')+'</tbody></table></div>';

    mkBar('ei1',MESES,[{data:MESES.map(m=>Math.round(sd.eq&&sd.eq[m]?sd.eq[m].ing_equipos:0)),backgroundColor:GD+'cc',borderRadius:4}],false,'S');
    mkBar('ei2',MESES,[{data:MESES.map(m=>sd.eq&&sd.eq[m]?sd.eq[m].n_equipos:0),backgroundColor:B+'88',borderRadius:4}],false,false);
  },80);
}

// ── GAMA & MARCAS ─────────────────────────────────────────────
function rGamaMarcas(sd,c){
  const {GA,GM,GB,total}=getGama(sd,cM,cMod);
  const totGT=GA+GM+GB;
  const mdata=getMarcas(sd,cM,cMod);
  const marcas=mdata.marcas||[];
  const mods=(mdata.modelos||[]).slice(0,10);
  c.innerHTML=
    '<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap">'+
      '<span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em">Modalidad</span>'+
      '<div class="pills">'+
        '<button class="pill'+(cMod==='TODOS'?' on p-m':'')+'" data-mod="TODOS" onclick="setMod(this.dataset.mod)">Global</button>'+
        '<button class="pill'+(cMod==='Postpago'?' on p-m':'')+'" data-mod="Postpago" onclick="setMod(this.dataset.mod)">Postpago</button>'+
        '<button class="pill'+(cMod==='Prepago'?' on p-m':'')+'" data-mod="Prepago" onclick="setMod(this.dataset.mod)">Prepago</button>'+
      '</div>'+
      '<span style="font-size:11px;color:#aaa">'+fmt(total)+' equipos movil</span>'+
    '</div>'+
    '<div class="kg3">'+
      kc(fmt(GA),'Gama Alta',pct(GA,totGT)+'% de equipos','c-gn','k-gn',null)+
      kc(fmt(GM),'Gama Media',pct(GM,totGT)+'%','c-or','k-or',null)+
      kc(fmt(GB),'Gama Baja',pct(GB,totGT)+'%','c-bl','k-bl',null)+
    '</div>'+
    '<div class="cg2">'+
      '<div class="cc"><div class="cct">Gama por mes</div>'+
        '<div class="leg"><span><span class="ld" style="background:'+G+'"></span>Alta</span><span><span class="ld" style="background:'+O+'"></span>Media</span><span><span class="ld" style="background:'+LB+'"></span>Baja</span></div>'+
        '<div style="position:relative;height:200px"><canvas id="gm1"></canvas></div></div>'+
      '<div class="cc"><div class="cct">Distribucion gama</div>'+
        '<div style="position:relative;height:200px"><canvas id="gm2"></canvas></div></div>'+
    '</div>'+
    '<div class="cg2" style="margin-top:12px">'+
      '<div class="cc"><div class="cct">Ranking marcas</div>'+
        '<div style="position:relative;height:'+Math.max(200,marcas.length*38)+'px"><canvas id="gm3"></canvas></div></div>'+
      '<div class="cc"><div class="cct">Top 10 modelos</div>'+
        '<div style="position:relative;height:'+Math.max(200,mods.length*38)+'px"><canvas id="gm4"></canvas></div></div>'+
    '</div>';
  setTimeout(()=>{
    const mk=sd.marcas2||{};
    mkBar('gm1',MESES,[
      {data:MESES.map(m=>mk[m]&&mk[m][cMod]?mk[m][cMod].gama['Gama alta']||0:0),backgroundColor:G+'cc',stack:'s',borderRadius:3},
      {data:MESES.map(m=>mk[m]&&mk[m][cMod]?mk[m][cMod].gama['Gama media']||0:0),backgroundColor:O+'cc',stack:'s',borderRadius:3},
      {data:MESES.map(m=>mk[m]&&mk[m][cMod]?mk[m][cMod].gama['Gama baja']||0:0),backgroundColor:LB+'cc',stack:'s',borderRadius:3}
    ],true,false);
    mkDonut('gm2',['Alta','Media','Baja'],[GA,GM,GB],[G,O,LB]);
    if(marcas.length>0){
      const mc=marcas.map(r=>r.gama==='Gama alta'?G:r.gama==='Gama media'?O:LB);
      mkBarH('gm3',marcas.map(r=>r.marca),[{data:marcas.map(r=>r.n),backgroundColor:mc,borderRadius:4}]);
    }
    if(mods.length>0){
      const mc2=mods.map(r=>r.gama==='Gama alta'?G:r.gama==='Gama media'?O:LB);
      mkBarH('gm4',mods.map(r=>r.modelo.split(' ').slice(0,3).join(' ')),[{data:mods.map(r=>r.n),backgroundColor:mc2,borderRadius:4}]);
    }
  },80);
}

// ── KPI TIENDAS ───────────────────────────────────────────────
function rKPITiendas(c){
  c.innerHTML=
    '<p class="sec-title">Comparativo de tiendas &mdash; '+(cM==='TODOS'?'Q1+Abr 2026':cM+' 2026')+'</p>'+
    '<div class="tbl-wrap"><table class="dt"><thead><tr>'+
      '<th>Tienda</th><th>Activ.</th><th>Postpago</th><th>Prepago</th><th>HFC</th><th>Equipos</th><th>CF (S/)</th><th style="color:#E07B39">Proy CF Abr (S/)</th>'+
    '</tr></thead><tbody>'+
    ALL.meta.tiendas_ok.map(pdv=>{
      const td=ALL.tiendas[pdv];if(!td)return'';
      const tu=getUnits(td,cM),tc=getCF(td,cM);
      const pa=td.cf&&td.cf['Abr']?td.cf['Abr'].total:0;
      return '<tr><td><strong>'+(SL[pdv]||pdv)+'</strong></td>'+
        '<td>'+fmt(tu.total)+'</td>'+
        '<td>'+fmt(tu.by_mod['Postpago']||0)+'</td>'+
        '<td>'+fmt(tu.by_mod['Prepago']||0)+'</td>'+
        '<td>'+fmt(tu.by_op['HFC']||0)+'</td>'+
        '<td>'+fmt(tu.by_tipo['Equipo']||0)+'</td>'+
        '<td>'+fmtS(Math.round(tc.total))+'</td>'+
        '<td style="color:#E07B39;font-weight:700">'+fmtS(Math.round(pa/9*30))+'</td></tr>';
    }).join('')+
    '<tr style="background:#1A3A5C08;font-weight:700;border-top:2px solid #1A3A5C22;color:#1A3A5C">'+
      (function(){const u=getUnits(ALL.global,cM),c=getCF(ALL.global,cM),pa=ALL.global.cf&&ALL.global.cf['Abr']?ALL.global.cf['Abr'].total:0;
        return '<td>TOTAL OPERACION</td><td>'+fmt(u.total)+'</td><td>'+fmt(u.by_mod['Postpago']||0)+'</td><td>'+fmt(u.by_mod['Prepago']||0)+'</td><td>'+fmt(u.by_op['HFC']||0)+'</td><td>'+fmt(u.by_tipo['Equipo']||0)+'</td><td>'+fmtS(Math.round(c.total))+'</td><td style="color:#E07B39">'+fmtS(Math.round(pa/9*30))+'</td>';
      })()+
    '</tr>'+
    '</tbody></table></div>'+
    '<div class="cg2">'+
      '<div class="cc"><div class="cct">CF por tienda (S/)</div>'+
        '<div style="position:relative;height:240px"><canvas id="kt1"></canvas></div></div>'+
      '<div class="cc"><div class="cct">HFC por tienda</div>'+
        '<div style="position:relative;height:240px"><canvas id="kt2"></canvas></div></div>'+
    '</div>';
  setTimeout(()=>{
    const lbls=ALL.meta.tiendas_ok.map(p=>(SL[p]||p).replace('Tienda - ',''));
    mkBar('kt1',lbls,[{data:ALL.meta.tiendas_ok.map(p=>{const td=ALL.tiendas[p];return Math.round(getCF(td,cM).total);}),backgroundColor:G+'cc',borderRadius:4}],false,'S');
    mkBar('kt2',lbls,[{data:ALL.meta.tiendas_ok.map(p=>{const td=ALL.tiendas[p];return getUnits(td,cM).by_op['HFC']||0;}),backgroundColor:O+'cc',borderRadius:4}],false,false);
  },80);
}

// ── RESUMEN ───────────────────────────────────────────────────
function rResumen(sd,vd,od,u,cf,c){
  c.innerHTML=
    (cM==='Abr'?projBox([
      {l:'Activaciones',v:fmt(proj(u.total,'Abr')||0),s:'Basado en 9 dias'},
      {l:'CF (S/)',v:fmtS(proj(cf.total,'Abr')||0),s:'Lineal'}
    ]):'')+ 
    '<div class="kg4">'+
      kc(fmt(u.total),'Activaciones','','c-bl','k-bl',projN(u.total,cM))+
      kc(fmt(u.by_mod['Postpago']||0),'Postpago',pct(u.by_mod['Postpago']||0,u.total)+'%','c-pu','k-pu',null)+
      kc(fmt(u.by_mod['Prepago']||0),'Prepago',pct(u.by_mod['Prepago']||0,u.total)+'%','c-or','k-or',null)+
      kc(fmt(u.by_op['HFC']||0),'HFC vendidas','','c-tl','k-tl',null)+
    '</div>'+
    '<div class="kg4">'+
      kc(fmtS(Math.round(cf.total)),'CF Acumulado','Solo postpago','c-tl','k-tl',projS(cf.total,cM))+
      kc(fmt(u.by_tipo['Equipo']||0),'Equipos',pct(u.by_tipo['Equipo']||0,u.total)+'%','c-gd','k-gd',null)+
      kc(fmt(u.by_tipo['Chip']||0),'Chips',pct(u.by_tipo['Chip']||0,u.total)+'%','c-bl','k-bl',null)+
      (function(){
    const oppPct=cM==='TODOS'?od.o.t.pct:((od.o.m.find(r=>r.mes===cM)||{pct:0}).pct);
    const oppHFC=cM==='TODOS'?od.o.t.hfc:((od.o.m.find(r=>r.mes===cM)||{hfc:0}).hfc);
    const oppMov=cM==='TODOS'?od.o.t.movil:((od.o.m.find(r=>r.mes===cM)||{movil:0}).movil);
    return kc(oppPct+'%','% Oport. fija/movil',oppHFC+' HFC / '+oppMov+' movil','c-gn','k-tl',null);
  })()+
    '</div>'+
    '<div class="cg2">'+
      '<div class="cc"><div class="cct">Por tipo de operacion</div>'+
        '<div style="position:relative;height:200px"><canvas id="r1"></canvas></div></div>'+
      '<div class="cc"><div class="cct">Post vs Prepago por mes</div>'+
        '<div class="leg"><span><span class="ld" style="background:'+P+'cc"></span>Postpago</span><span><span class="ld" style="background:'+O+'cc"></span>Prepago</span></div>'+
        '<div style="position:relative;height:200px"><canvas id="r2"></canvas></div></div>'+
    '</div>';
  const colors=[B,G,O,P,GD,R,LB,'#f472b6','#34d399','#fb923c'];
  setTimeout(()=>{
    const ops=Object.entries(u.by_op).sort((a,b)=>b[1]-a[1]);
    const lp={id:'lp',afterDatasetsDraw(chart){
      const ctx=chart.ctx;
      chart.data.datasets.forEach((ds,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const v=ds.data[i];if(!v)return;
          ctx.save();ctx.fillStyle='#555';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
          ctx.fillText(v.toLocaleString('es-PE'),bar.x,bar.y-4);ctx.restore();
        });
      });
    }};
    const slp={id:'slp',afterDatasetsDraw(chart){
      const ctx=chart.ctx,ds=chart.data.datasets,lm=chart.getDatasetMeta(ds.length-1);
      lm.data.forEach((bar,i)=>{
        const tot=ds.reduce((a,d)=>a+(d.data[i]||0),0);if(!tot)return;
        ctx.save();ctx.fillStyle='#333';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
        ctx.fillText(tot.toLocaleString('es-PE'),bar.x,bar.y-4);ctx.restore();
      });
    }};
    const er1=document.getElementById('r1');
    if(er1){charts['r1']=new Chart(er1,{type:'bar',data:{
      labels:ops.map(o=>o[0].replace(' Nueva','').replace(' - AD','-AD')),
      datasets:[{data:ops.map(o=>o[1]),backgroundColor:ops.map((_,i)=>colors[i%colors.length]),borderRadius:4}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},
              y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#888',font:{size:9}}}}},plugins:[lp]});}
    const er2=document.getElementById('r2');
    if(er2){charts['r2']=new Chart(er2,{type:'bar',data:{labels:MESES,datasets:[
      {data:MESES.map(m=>vd.units&&vd.units[m]&&vd.units[m].by_mod?vd.units[m].by_mod['Postpago']||0:0),backgroundColor:P+'cc',stack:'s',borderRadius:3},
      {data:MESES.map(m=>vd.units&&vd.units[m]&&vd.units[m].by_mod?vd.units[m].by_mod['Prepago']||0:0),backgroundColor:O+'cc',stack:'s',borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#888',font:{size:10}}},
              y:{stacked:true,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#888',font:{size:9}}}}},plugins:[slp]});}
  },80);
}

// ── OPORTUNIDAD ───────────────────────────────────────────────
function rOpp(od,c){

      {data:oms.map(r=>r.hfc),backgroundColor:G+'cc',borderColor:G,borderWidth:1,stack:'s',borderRadius:3}
    ],true,false);
    mkBar('op2',oms.map(r=>r.mes),[
      {data:oms.map(r=>r.pct),backgroundColor:oms.map(r=>r.pct>=15?G:r.pct>=8?O:R),borderRadius:4}
    ],false,true);
  },80);
}

// ── PROYECCION ────────────────────────────────────────────────
function rProyeccion(c){
  const g=ALL.global;
  const aU=g.units&&g.units['Abr']||{total:0,by_op:{},by_tipo:{}};
  const aCF=g.cf&&g.cf['Abr']||{total:0};
  const aEq=g.eq&&g.eq['Abr']||{n_equipos:0,ing_equipos:0};
  c.innerHTML=
    '<p class="sec-title">&#x25B6; Proyeccion lineal Abril 2026 (base: 9 dias)</p>'+
    projBox([
      {l:'Total activaciones',v:fmt(Math.round(aU.total/9*30)),s:'Actual: '+fmt(aU.total)},
      {l:'CF total (S/)',v:fmtS(Math.round(aCF.total/9*30)),s:'Actual: '+fmtS(Math.round(aCF.total))},
      {l:'Equipos',v:fmt(Math.round((aU.by_tipo['Equipo']||0)/9*30)),s:''},
      {l:'HFC',v:fmt(Math.round((aU.by_op['HFC']||0)/9*30)),s:''},
      {l:'Ingreso equipos',v:fmtS(Math.round(aEq.ing_equipos/9*30)),s:''}
    ])+
    '<p class="sec-title" style="margin-top:10px">Por tienda</p>'+
    '<div class="tbl-wrap"><table class="dt"><thead><tr>'+
      '<th>Tienda</th><th>Activ. actual</th><th>Proy. activ.</th><th>CF actual (S/)</th><th>Proy. CF (S/)</th><th>HFC actual</th><th>Proy. HFC</th>'+
    '</tr></thead><tbody>'+
    ALL.meta.tiendas_ok.map(pdv=>{
      const td=ALL.tiendas[pdv];if(!td)return'';
      const au=td.units&&td.units['Abr']||{total:0,by_op:{}};
      const ac=td.cf&&td.cf['Abr']||{total:0};
      const hf=au.by_op['HFC']||0;
      return '<tr><td><strong>'+(SL[pdv]||pdv)+'</strong></td>'+
        '<td>'+fmt(au.total)+'</td><td style="color:#E07B39;font-weight:700">'+fmt(Math.round(au.total/9*30))+'</td>'+
        '<td>'+fmtS(Math.round(ac.total))+'</td><td style="color:#E07B39;font-weight:700">'+fmtS(Math.round(ac.total/9*30))+'</td>'+
        '<td>'+fmt(hf)+'</td><td style="color:#E07B39;font-weight:700">'+fmt(Math.round(hf/9*30))+'</td></tr>';
    }).join('')+
    '<tr style="background:#1A3A5C08;font-weight:700;border-top:2px solid #1A3A5C22;color:#1A3A5C">'+
      '<td>TOTAL OPERACION</td>'+
      '<td>'+fmt((ALL.global.units['Abr']||{total:0}).total)+'</td>'+
      '<td style="color:#E07B39">'+fmt(Math.round((ALL.global.units['Abr']||{total:0}).total/9*30))+'</td>'+
      '<td>'+fmtS(Math.round((ALL.global.cf['Abr']||{total:0}).total))+'</td>'+
      '<td style="color:#E07B39">'+fmtS(Math.round((ALL.global.cf['Abr']||{total:0}).total/9*30))+'</td>'+
      '<td>'+fmt(((ALL.global.units['Abr']||{by_op:{}}).by_op||{})['HFC']||0)+'</td>'+
      '<td style="color:#E07B39">'+fmt(Math.round((((ALL.global.units['Abr']||{by_op:{}}).by_op||{})['HFC']||0)/9*30))+'</td>'+
    '</tr>'+
    '</tbody></table></div>';
}

buildSP();buildVP();buildTabs();render();
