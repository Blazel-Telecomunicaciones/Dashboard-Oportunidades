<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blazel A&M — Dashboard Integral 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f2f5;color:#1a1a1a;font-size:13px}
/* HEADER */
.hdr{background:#1A3A5C;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700}
.hdr p{font-size:10px;opacity:.6;margin-top:2px}
.live{background:#E07B39;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
/* LEVEL SELECTOR */
.lvl-bar{background:#0F2840;padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap}
.lvl{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.35);color:rgba(255,255,255,.85);background:transparent;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.lvl:hover{background:rgba(255,255,255,.1)}
.lvl.act{background:#E07B39;color:#fff;border-color:#E07B39;font-weight:700}
/* FILTERS */
.fbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.flbl{font-size:10px;font-weight:700;color:#999;letter-spacing:.06em;text-transform:uppercase;min-width:55px}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:16px;border:1px solid #d1d5db;background:#fff;color:#666;cursor:pointer;font-size:11px;font-weight:500;transition:all .12s;white-space:nowrap}
.pill:hover:not(.on){background:#f5f5f5}
.pill.on{color:#fff;border-color:transparent;font-weight:700}
.p-s{background:#1A3A5C}.p-v{background:#7F77DD}.p-m{background:#E07B39}
.p-zero{background:#FEE2E2;color:#DC2626;border-color:#FCA5A5}
/* TABS */
.tabbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;gap:0;overflow-x:auto}
.ttab{padding:9px 16px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .12s}
.ttab.act{color:#1A3A5C;border-bottom-color:#1A3A5C}
.ttab.ttab-nd{color:#DC2626;opacity:.7}
.ttab:hover:not(.act){color:#333}
/* MAIN */
.main{padding:14px 18px;max-width:1500px;margin:0 auto}
.ctx{font-size:11px;color:#888;padding:5px 12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:12px}
/* KPI GRID */
.kg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 15px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.k-bl::before{background:#1A3A5C}.kc.k-tl::before{background:#1D9E75}
.kc.k-or::before{background:#E07B39}.kc.k-rd::before{background:#DC2626}
.kc.k-pu::before{background:#7F77DD}.kc.k-gd::before{background:#D97706}
.klbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.kval{font-size:24px;font-weight:800;line-height:1;margin-bottom:2px}
.ksub{font-size:10px;color:#aaa}
.kproj{font-size:11px;color:#E07B39;font-weight:600;margin-top:3px}
.c-tl{color:#1D9E75}.c-or{color:#E07B39}.c-gn{color:#15803D}.c-bl{color:#1A3A5C}.c-rd{color:#DC2626}.c-pu{color:#7F77DD}.c-gd{color:#D97706}
/* CHARTS */
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px}
.cct{font-size:11px;font-weight:700;color:#555;margin-bottom:8px}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;font-size:10px;color:#888}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:2px;vertical-align:middle}
/* TABLE */
.tbl-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:14px}
.tbl-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0}
.tbl-hdr h3{font-size:12px;font-weight:700;color:#444}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{text-align:left;padding:7px 12px;background:#f9fafb;color:#777;font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #e5e7eb;white-space:nowrap}
table.dt td{padding:7px 12px;border-bottom:1px solid #f5f5f5;color:#1a1a1a;vertical-align:middle}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700}
.b-ga{background:#DCFCE7;color:#15803D}.b-gm{background:#FEF3C7;color:#92400E}.b-gb{background:#EFF6FF;color:#1d4ed8}
.b-post{background:#EDE9FE;color:#5b21b6}.b-pre{background:#FEF9C3;color:#713f12}
/* PROJ BOX */
.proj-box{background:linear-gradient(135deg,#E07B3915,#E07B3905);border:1px solid #E07B3930;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.proj-item{text-align:center}
.proj-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.proj-val{font-size:20px;font-weight:800;color:#E07B39}
.proj-sub{font-size:10px;color:#aaa}
/* SECTION */
.sec-title{font-size:12px;font-weight:700;color:#444;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb}
@media(max-width:700px){.kg4{grid-template-columns:1fr 1fr}.cg2{grid-template-columns:1fr}.cg3{grid-template-columns:1fr}}
</style>
</head>

<div class="hdr">
  <div><h1>&#9889; Blazel A&M &mdash; Dashboard Integral 2026</h1>
  <p>Solo Postpago (movil) &bull; Actualizado al 12-Abr-2026 &bull; Proyeccion lineal por dias</p></div>

</div>


<div id="qc-bar" style="background:#fff;border-bottom:2px solid #e5e7eb;padding:8px 20px;display:none">

  </div>

</div>

<!-- NIVEL -->
<div class="lvl-bar">

</div>

<!-- FILTERS -->
<div class="fbar" id="fbar">

    <span class="flbl">Tienda</span>
    <div class="pills" id="sp"></div>
  </div>
  <div style="display:flex;align-items:center;gap:6px" id="vp-row" style="display:none">
    <span class="flbl">Vendedor</span>
    <div class="pills" id="vp"></div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="flbl">Mes</span>
    <div class="pills" id="mp">
      <button class="pill on p-m" data-k="TODOS" onclick="setMes('TODOS')">Q1+Abr</button>
      <button class="pill" data-k="Ene" onclick="setMes('Ene')">Ene</button>
      <button class="pill" data-k="Feb" onclick="setMes('Feb')">Feb</button>

      <button class="pill" data-k="Abr" onclick="setMes('Abr')">Abr &#x25B6;</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabbar" id="tabbar"></div>

<!-- MAIN -->
<div class="main">
  <div class="ctx" id="ctx"></div>
  <div id="content"></div>
</div>

// ── HELPERS ──────────────────────────────────────────────────
function qs(s){return Array.from(document.querySelectorAll(s));}
function setAct(sel,val,cls){qs(sel+' .pill').forEach(p=>{p.classList.remove('on',cls);if(p.dataset.k===val)p.classList.add('on',cls);});}
function fmt(n,dec=0){return n===undefined||n===null?'0':Number(n).toLocaleString('es-PE',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fmtS(n){return 'S/'+fmt(n,0);}
function pct(a,b){return b>0?+(a/b*100).toFixed(1):0;}

function proj(val,mes){
  if(mes==='TODOS') return null;
  const dt=DIAS_TRANS[mes]||1, dm=DIAS_MES[mes]||30;
  if(dt===dm) return null; // mes completo
  return Math.round(val/dt*dm);
}
function projF(val,mes,dec=0){
  const p=proj(val,mes); if(!p) return null;
  return dec>0?p.toFixed(dec):p;
}

function getStoreData(){
  if(cS==='TODAS') return D.global;
  return D.tiendas[cS]||D.global;
}
function getVendData(){
  if(cV==='TODOS') return getStoreData();
  const pdv=cS==='TODAS'?null:cS;
  if(!pdv) return getStoreData();
  const vd=D.vendedores[cS];
  if(vd&&vd[cV]) return vd[cV];
  return getStoreData();
}
function getOppData(){
  if(cS==='TODAS') return D.opp.global;
  const od=D.opp[cS];if(!od) return D.opp.global;
  if(cV!=='TODOS'&&od[cV]) return od[cV];
  return od.TODOS||D.opp.global;
}

function getMesUnits(d,mes){
  const u=d.units;if(!u) return null;
  if(mes==='TODOS'){
    const tot={total:0,proj:null,by_mod:{},by_tipo:{},by_op:{}};
    MESES.forEach(m=>{const r=u[m];if(!r)return;tot.total+=r.total;
      Object.entries(r.by_mod||{}).forEach(([k,v])=>tot.by_mod[k]=(tot.by_mod[k]||0)+v);
      Object.entries(r.by_tipo||{}).forEach(([k,v])=>tot.by_tipo[k]=(tot.by_tipo[k]||0)+v);
      Object.entries(r.by_op||{}).forEach(([k,v])=>tot.by_op[k]=(tot.by_op[k]||0)+v);
    }); return tot;
  }
  return u[mes]||{total:0,by_mod:{},by_tipo:{},by_op:{}};
}
function getMesCF(d,mes){
  const c=d.cf;if(!c) return null;
  if(mes==='TODOS'){
    const tot={total:0,by_tipo:{},by_op:{}};
    MESES.forEach(m=>{const r=c[m];if(!r)return;tot.total+=r.total;
      Object.entries(r.by_tipo||{}).forEach(([k,v])=>tot.by_tipo[k]=(tot.by_tipo[k]||0)+v);
      Object.entries(r.by_op||{}).forEach(([k,v])=>tot.by_op[k]=(tot.by_op[k]||0)+v);
    }); return tot;
  }
  return c[mes]||{total:0,by_tipo:{},by_op:{}};
}
function getMesEq(d,mes){
  const e=d.eq;if(!e) return null;
  if(mes==='TODOS'){
    const tot={n_equipos:0,ing_equipos:0,cuotas_ini:0,rentas_adel:0,total_col:0};
    MESES.forEach(m=>{const r=e[m];if(!r)return;
      tot.n_equipos+=r.n_equipos||0;tot.ing_equipos+=r.ing_equipos||0;
      tot.cuotas_ini+=r.cuotas_ini||0;tot.rentas_adel+=r.rentas_adel||0;tot.total_col+=r.total_col||0;
    }); return tot;
  }
  return e[mes]||{n_equipos:0,ing_equipos:0,cuotas_ini:0,rentas_adel:0,total_col:0};
}

function dC(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};}
function mkBar(id,labels,datasets,stacked,yFmt,showLabels=true){
  const el=document.getElementById(id);if(!el)return;
  CH[id]=new Chart(el,{type:'bar',data:{labels,datasets},plugins:[ChartDataLabels],options:{
    responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>0;},color:'#333',font:{size:9,weight:'bold'},anchor:stacked?'center':'end',align:stacked?'center':'top',formatter:function(v){if(!v)return'';return yFmt==='S'?'S/'+v.toLocaleString():(yFmt?v+'%':v.toLocaleString());}}},
    scales:{
      x:{stacked:!!stacked,grid:{display:false},ticks:{color:'#888',font:{size:10}}},
      y:{stacked:!!stacked,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#888',font:{size:9},
         callback:yFmt?v=>(yFmt==='S'?'S/'+v.toLocaleString():v+'%'):undefined}}}}});}
function mkDoughnut(id,labels,data,colors){
  const el=document.getElementById(id);if(!el)return;
  CH[id]=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},plugins:[ChartDataLabels],
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',
      labels:{font:{size:9},color:'#888',padding:8}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>0;},color:'#fff',font:{size:10,weight:'bold'},formatter:function(v,ctx){var sum=ctx.dataset.data.reduce(function(a,b){return a+b;},0);var pct=sum>0?Math.round(v/sum*100):0;return pct+'%';}}}}});}

function kc(val,lbl,sub,vc,kk,proj_val){
  return `<div class="kc ${kk}"><div class="klbl">${lbl}</div><div class="kval ${vc}">${val}</div><div class="ksub">${sub}</div>${proj_val?`<div class="kproj">&#x25B6; Proy: ${proj_val}</div>`:''}</div>`;}

const TABS={
  ceo:     ['KPIs Consolidados','Plan de Trabajo','Avance Q','Cargo Fijo','Proyección'],
  gerencia:['KPIs Tiendas','Avance Q','Cargo Fijo','Equipos & Ingresos','Gama & Marcas','Oportunidad'],
  jefatura:['Resumen','Avance Q','Cargo Fijo','Oportunidad Fija'],
  supervision:['Mi Tienda','Avance Q','Cargo Fijo','Oportunidad Fija']
};

function setLvl(l){
  cLvl=l;cTab=0;cS='TODAS';cV='TODOS';updateFbar();
  qs('.lvl').forEach(b=>b.classList.toggle('act',b.textContent.toLowerCase().startsWith(l.substring(0,4))));
  buildFilters();buildTabs();render();
}
function setStore(s){cS=s;cV='TODOS';setAct('#sp',s,'p-s');buildVP();render();}
function setVend(v){cV=v;setAct('#vp',v,'p-v');render();}
function setMes(m){cM=m;setAct('#mp',m,'p-m');render();}
function setQ2Mod(m){cQ2Mod=m;render();}
function setTab(t){cTab=t;qs('.ttab').forEach((el,i)=>el.classList.toggle('act',i===t));updateFbar();render();}
function updateFbar(){const isPT=(cLvl==='ceo'&&cTab===1);const fb=document.querySelector('.fbar');if(fb)fb.style.display=isPT?'none':'flex';if(isPT)cS='TODAS';}

function buildFilters(){
  document.getElementById('sp').innerHTML=STORES.map(s=>
    `<button class="pill${s==='TODAS'?' on p-s':''}" data-k="${s}" onclick="setStore('${s}')">${SL[s]||s.replace('Tienda - ','')}</button>`
  ).join('');
  buildVP();
}
function buildVP(){
  const row=document.getElementById('vp-row');
  const show=cLvl==='supervision'||(cLvl==='jefatura'&&cS!=='TODAS');
  if(row) row.style.display=show?'flex':'none';
  if(!show)return;
  const vs=VENDS[cS]||['TODOS'];
  document.getElementById('vp').innerHTML=vs.map(v=>{
    const nm=v==='TODOS'?'TODOS':v.split(' ').slice(0,2).join(' ');
    let active=true;
    if(v!=='TODOS'&&cM!=='TODOS'&&cS!=='TODAS'){
      const vdata=D.vendedores&&D.vendedores[cS]&&D.vendedores[cS][v];
      const u=vdata&&vdata.units&&vdata.units[cM];
      active=!!(u&&u.total>0);
    }
    const sel=(v===cV);
    const cls=sel?' on p-v':(!active?' p-zero':'');
    return `<button class="pill${cls}" data-k="${v}" data-vnd="${v}" onclick="setVend(this.dataset.vnd)">${nm}</button>`;
  }).join('');
}
function buildTabs(){
  const tabs=TABS[cLvl]||[];
  document.getElementById('tabbar').innerHTML=tabs.map((t,i)=>{
    const noData=(t==='Plan de Trabajo'||t==='Proyección')&&cM!=='TODOS'&&cM!=='Abr';
    return `<button class="ttab${i===cTab?' act':''}${noData?' ttab-nd':''}" onclick="setTab(${i})">${t}${noData?' ⚠':''}</button>`;
  }).join('');
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  dC();
  const d=getVendData();
  const od=getOppData();
  const slbl=(SL[cS]||cS.replace('Tienda - ','').replace('TODAS','Todas las tiendas'));
  const vlbl=cV==='TODOS'?'':' · '+cV.split(' ').slice(0,2).join(' ');
  const mlbl=cM==='TODOS'?'Q1 + Abr 2026':(cM==='Abr'?'Abr 2026 (parcial → proyección)':cM+' 2026');
  document.getElementById('ctx').textContent=`${slbl}${vlbl}  ·  ${mlbl}  ·  2026`;

  const u=getMesUnits(d,cM)||{total:0,by_mod:{},by_tipo:{},by_op:{}};
  const cf=getMesCF(d,cM)||{total:0,by_tipo:{},by_op:{}};
  const eq=getMesEq(d,cM)||{n_equipos:0,ing_equipos:0,cuotas_ini:0,rentas_adel:0};

  const fn={'ceo':renderCEO,'gerencia':renderGerencia,'jefatura':renderJefatura,'supervision':renderSupervision};
  (fn[cLvl]||renderJefatura)(d,od,u,cf,eq);
}

function projBox(items){
  return `<div class="proj-box">${items.map(i=>`<div class="proj-item"><div class="proj-lbl">${i.lbl}</div><div class="proj-val">${i.val}</div><div class="proj-sub">${i.sub}</div></div>`).join('')}</div>`;
}

function renderCEO(d,od,u,cf,eq){
  const c=document.getElementById('content');
  if(cTab===0){
    const mlbl=cM==='TODOS'?'Ene-Abr':cM;
    const totU=u.total;
    const totPost=(u.by_mod&&u.by_mod['Postpago'])||0;
    const totCF=cf.total;
    const totEq=eq.ing_equipos;
    const totHFC=(u.by_op&&u.by_op['HFC'])||0;
    const totGA=cM==='TODOS'?MESES.reduce((a,m)=>{const g=D.global.gama[m]||{};return a+(g['Gama alta']||0);},0):(D.global.gama[cM]&&D.global.gama[cM]['Gama alta']||0);
    // Opp data filtered
    const oppMeses=cM==='TODOS'?od.o.m:od.o.m.filter(x=>x.mes===cM);
    const oppMovil=oppMeses.reduce((a,x)=>a+x.movil,0);
    const oppHfc=oppMeses.reduce((a,x)=>a+x.hfc,0);
    const oppPct=oppMovil>0?+(oppHfc/oppMovil*100).toFixed(1):0;
    // Projection only for Abr or TODOS
    const showProj=(cM==='Abr'||cM==='TODOS');
    const aU=D.global.units['Abr']||{total:0}; const projU=Math.round(aU.total/12*30);
    const aCF=D.global.cf['Abr']||{total:0}; const projCF=Math.round(aCF.total/12*30);
    c.innerHTML=`
      <p class="sec-title">&#128200; KPIs Globales 2026 (${mlbl})</p>
      <div class="kg4">
        ${kc(fmt(totU),'Activaciones totales','Todas las operaciones','c-bl','k-bl',null)}
        ${kc(fmt(totPost),'Movil Postpago',pct(totPost,totU)+'% del total','c-pu','k-pu',null)}
        ${kc(fmtS(Math.round(totCF)),'Cargo Fijo'+(cM==='TODOS'?' Acumulado':''),'Solo postpago · S/','c-tl','k-tl',null)}
        ${kc(fmt(totHFC),'HFC Vendidas','Fija residencial','c-or','k-or',null)}
      </div>
      <div class="kg4">
        ${kc(fmtS(Math.round(totEq)),'Ingreso por Equipos','Precio equipos cobrados','c-gd','k-gd',null)}
        ${kc(fmt(totGA),'Gama Alta','Equipos postpago','c-gn','k-tl',null)}
        ${kc(fmt(oppHfc),'Fijas a clientes movil','Crosselling postpago','c-or','k-or',null)}
        ${kc(oppPct+'%','% Oportunidad fija/movil','Conv. postpago → HFC','c-tl','k-tl',null)}
      </div>
      ${showProj?projBox([
        {lbl:'Proyección Unidades Abr',val:fmt(projU),sub:'Base: '+fmt(aU.total)+' en 12 días'},
        {lbl:'Proyección CF Abr',val:fmtS(projCF),sub:'Base: '+fmtS(Math.round(aCF.total))+' en 12 días'}
      ]):''}
      <p class="sec-title" style="margin-top:4px">&#127968; Resumen por Tienda — ${mlbl}</p>
      <div class="tbl-wrap"><table class="dt">
        <thead><tr><th>Tienda</th><th>Activaciones</th><th>Postpago</th><th>HFC</th><th>CF (S/)</th>${showProj?'<th>Proy CF Abr (S/)</th>':''}</tr></thead>
        <tbody>${[...D.meta.all_pdvs].map(pdv=>{
          const td=D.tiendas[pdv];if(!td)return'';
          const tu=getMesUnits(td,cM);
          const tcf=getMesCF(td,cM);
          const tp=(tu.by_mod&&tu.by_mod['Postpago'])||0;
          const th2=(tu.by_op&&tu.by_op['HFC'])||0;
          const acf=td.cf['Abr']||{total:0}; const pcf=Math.round(acf.total/12*30);
          return '<tr><td><strong>'+SL[pdv]+'</strong></td><td>'+fmt(tu.total)+'</td><td>'+fmt(tp)+'</td><td>'+fmt(th2)+'</td><td>'+fmtS(Math.round(tcf.total))+'</td>'+(showProj?'<td style="color:#E07B39;font-weight:700">'+fmtS(pcf)+'</td>':'')+'</tr>';
        }).join('')}</tbody>
      </table></div>`;
  } else if(cTab===1) rCuotaAvance(c);
  else if(cTab===2) renderAvanceQ(d,u,c);
  else if(cTab===3) renderCF(d,cf,c);
  else renderProyeccion(c);

// ── QC (Control de Calidad) ─────────────────────────────────
function toggleQCDetail(){
  const d=document.getElementById('qc-detail');
  d.style.display=d.style.display==='none'?'block':'none';
}

function runQC(){
  document.getElementById('qc-bar').style.display='block';
  const allPDVs=D.meta.all_pdvs;
  const issues=[];
  let blanks=0, zeros=0, vendDups=0;
  
  // Check each PDV for data completeness
  allPDVs.forEach(pdv=>{
    const td=D.tiendas[pdv]; if(!td) return;
    MESES.forEach(m=>{
      const u=td.units[m]; const c=td.cf[m];
      // Check for undefined/null data
      if(!u||u.total===undefined){issues.push('⚠ '+pdv+' → '+m+': unidades sin data');blanks++;}
      if(!c||c.total===undefined){issues.push('⚠ '+pdv+' → '+m+': CF sin data');blanks++;}
      // Check zero CF with non-zero units (excluding prepago-only channels)
      if(u&&u.total>0&&c&&c.total===0&&pdv!=='Usuario Blazel'&&pdv!=='Multimarca'){
        if(!(u.by_mod&&Object.keys(u.by_mod).length===1&&u.by_mod['Prepago']&&!u.by_tipo['Equipo'])){
          issues.push('⚡ '+pdv+' → '+m+': '+u.total+' unidades pero CF=S/0');zeros++;
        }
      }
    });
  });
  
  // Check vendedor duplicates
  const vendNames={};
  Object.entries(D.vendedores||{}).forEach(([pdv,vends])=>{
    Object.keys(vends).forEach(v=>{
      if(v==='TODOS')return;
      const key=v.toLowerCase().trim();
      if(!vendNames[key])vendNames[key]=[];
      vendNames[key].push(pdv);
    });
  });
  Object.entries(vendNames).forEach(([name,pdvs])=>{
    if(pdvs.length>1){
      // Same person in multiple PDVs is OK, but same name different caps is a dup
      const unique=new Set(pdvs);
      if(unique.size>1){issues.push('👤 Vendedor "'+name+'" aparece en: '+[...unique].join(', '));vendDups++;}
    }
  });
  
  // Also check for vendedor name variations within same PDV
  Object.entries(D.vendedores||{}).forEach(([pdv,vends])=>{
    const names=Object.keys(vends).filter(v=>v!=='TODOS');
    const normalized={};
    names.forEach(n=>{
      const k=n.toLowerCase().replace(/\s+/g,' ').trim();
      if(!normalized[k])normalized[k]=[];
      normalized[k].push(n);
    });
    Object.entries(normalized).forEach(([k,variants])=>{
      if(variants.length>1){
        issues.push('⚠ '+pdv+': nombre duplicado → '+variants.join(' / '));vendDups++;
      }
    });
  });
  
  // Update badges
  document.getElementById('qc-pdvs').textContent='✅ '+allPDVs.length+' PDVs cargados (12 canales)';
  
  const blankEl=document.getElementById('qc-blanks');
  blankEl.textContent=blanks===0?'✅ Sin cuadros en blanco':'⚠ '+blanks+' campos sin data';
  blankEl.style.background=blanks===0?'#DCFCE7':'#FEE2E2';
  blankEl.style.color=blanks===0?'#15803D':'#DC2626';
  
  const zeroEl=document.getElementById('qc-zeros');
  zeroEl.textContent=zeros===0?'✅ CF consistente':'⚡ '+zeros+' CF=0 con ventas';
  zeroEl.style.background=zeros===0?'#DCFCE7':'#FEF3C7';
  zeroEl.style.color=zeros===0?'#15803D':'#92400E';
  
  const dupEl=document.getElementById('qc-venddup');
  dupEl.textContent=vendDups===0?'✅ Vendedores OK':'⚠ '+vendDups+' duplicados nombre';
  dupEl.style.background=vendDups===0?'#DCFCE7':'#FEF3C7';
  dupEl.style.color=vendDups===0?'#15803D':'#92400E';
  
  document.getElementById('qc-detail').innerHTML=issues.length===0?
    '<div style="color:#15803D;font-weight:700">✅ Todo limpio — sin problemas de calidad detectados</div>':
    '<div style="font-weight:700;margin-bottom:4px;color:#DC2626">'+issues.length+' observaciones:</div>'+
    issues.map(i=>'<div style="padding:2px 0;border-bottom:1px solid #eee">'+i+'</div>').join('');
}
